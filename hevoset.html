---
layout: default
title: Tallin hevoset
---
<div>
    <label for="breedFilter">Rotu:</label>
    <select id="breedFilter" onchange="filterHorses()">
        <option value="all">Kaikki</option>
        <option value="Suomenhevonen">Suomenhevonen</option>
        <option value="Shetlanninponi">Shetlanninponi</option>
        <option value="Puoliverinen">Puoliverinen</option>
        <option value="Islanninhevonen">Islanninhevonen</option>
        <option value="Irlannincob">Irlannincob</option>
        <option value="New Forest">New Forest</option>
        <option value="Connemara">Connemara</option>
        <option value="Ratsuponi">Ratsuponi</option>
        <option value="Norjanvuonohevonen">Norjanvuonohevonen</option>
    </select>

    <label for="sexFilter">Sukupuoli:</label>
    <select id="sexFilter" onchange="filterHorses()">
        <option value="all">Kaikki</option>
        <option value="Ruuna">Ruuna</option>
        <option value="Tamma">Tamma</option>
        <option value="Ori">Ori</option>
    </select>

    <label for="ageFilter">Ikä:</label>
    <select id="ageFilter" onchange="filterHorses()">
        <option value="all">Kaikki</option>
        <option value="0-5">0-5 vuotta</option>
        <option value="6-10">6-10 vuotta</option>
        <option value="11-15">11-15 vuotta</option>
    </select>

    <button class="reset-button" onclick="resetFilters()">Tyhjennä haku</button>
</div>

<div class="horse-list">
    {% for horse in site.horses %}
    <div class="horse-card" data-breed="{{ horse.breed }}" data-sex="{{ horse.sex }}" data-age="{{ horse.age }}">
        <img src="{{ horse.gallery[0].filename | relative_url }}"
            alt="{{ horse.nickname }}, {{ horse.breed }}, {{ horse.age }}v" class="horse-image">
        <div>
            <div class="horse-name"><a href="{{ horse.url | relative_url }}">{{ horse.nickname }}</a></div>
            <div class="horse-info">{{ horse.breed }}, {{ horse.age }}v</div>
            <div class="horse-special">{{ horse.description | truncate: 100 }}</div>
        </div>
    </div>
    {% endfor %}
</div>

<p id="error-message" class="error-message" style="display: none;">Ei löytynyt hevosia annetuilla kriteereillä.</p>

<script src="{{ '/assets/js/horse-listing-filter.js' | relative_url }}"></script>
